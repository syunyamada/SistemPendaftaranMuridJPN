<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Laman Ringkas</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 15px;
            shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        p { color: #666; }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello Dunia!</h1>
        <p>Ini adalah halaman index paling ringkas yang dibuat di Ubuntu.</p>
        <a href="https://github.com" class="button">Buka GitHub</a>
    </div>

</body>
</html>
